---
- name: Apply baseline configuration to a new Raspberry Pi server after bootstrap
  hosts: lab
  become: true
  gather_facts: true
  roles:
    - debian_update
    - common
    - raspberry
    - debian_hardening
    - network
    - docker
  vars:
    debian_update_mode: "full"
    common_admin_groups:
      - adm
      - dialout
      - sudo
      - plugdev
      - netdev
      - docker
    common_install_tailscale: true
    common_admin_authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICHvfORDLKCBFhwwviIAY2RtARl3LclLIEVE1r7JCVMl"
    common_hostname: "srvlab01"
    raspberry_disable_pi_user: true
    raspberry_expand_rootfs: false
    debian_hardening_disable_services: ["bluetooth"]
    debian_hardening_ssh_allow_groups: ["admin", "sudo"]
    debian_hardening_ssh_permit_root_login: "no"
    debian_hardening_ssh_password_auth: false
    debian_hardening_ssh_kbdinteractive_auth: false
    debian_hardening_ssh_pubkey_auth: true
    debian_hardening_ssh_max_auth_tries: 3
    debian_hardening_ssh_login_grace_time: "30s"
    debian_hardening_ssh_client_alive_interval: 300
    debian_hardening_ssh_client_alive_count_max: 2
    network_interface: "eth0"
    network_address: "192.168.1.130/24"
    network_gateway: "192.168.1.1"
    network_dns: ["127.0.0.1", "192.168.1.126"]
  vars_files:
    - ../inventory/group_vars/prod-vault.yaml

  tasks:
    - name: Trigger immediate reboot
      ansible.builtin.command: /sbin/reboot
      async: 1
      poll: 0
      become: true
