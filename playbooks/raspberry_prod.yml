---
- name: Apply baseline configuration to a new Raspberry Pi server after bootstrap
  hosts: prod
  become: true
  gather_facts: true
  vars_files:
    - ../inventory/group_vars/prod-vault.yaml
  tasks:
    - name: Include roles defined in the host variable "assigned_roles"
      include_role:
        name: "{{ item }}"
      loop: "{{ assigned_roles | default([]) }}"

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /run/reboot-required
      register: reboot_required
      become: true

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: "Reboot requested by raspberry_prod playbook"
        reboot_timeout: 600
      when: reboot_required.stat.exists
      become: true
