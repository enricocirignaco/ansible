---
# tasks file for rock_4b

# Preliminary checks and facts gathering
- name: Read device model string from device tree
  ansible.builtin.slurp:
    path: /proc/device-tree/model
  register: rock_4b_dt_model
  ignore_errors: true

- name: Set cleaned device tree model string
  ansible.builtin.set_fact:
    rock_4b_model: >-
      {{
        (rock_4b_dt_model.content | b64decode | regex_replace('\u0000', ''))
        if (rock_4b_dt_model is defined and rock_4b_dt_model.content is defined)
        else ''
      }}

- name: Assert Debian family host
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "Role enricocirignaco.radxa.rock_4b currently supports Debian-family systems only."

- name: Assert Rock 4B model
  ansible.builtin.assert:
    that:
      - rock_4b_model == rock_4b_expected_model
    fail_msg: "This host does not look like a Rock 4B. Detected model: {{ rock_4b_model | default('unknown') }}"

# Remove KDE desktop and related components if requested
- name: Remove KDE and desktop package set
  ansible.builtin.apt:
    autoremove: true
    name: "{{ item }}"
    state: absent
    purge: true
  loop:
    - task-kde-desktop
    - task-desktop
    - kde-standard
    - plasma-desktop
    - plasma-workspace
    - plasma-workspace-wayland
    - kwin-x11
    - kwin-wayland
    - kded5
    - kscreen
    - kdeconnect
    - bluedevil
    - yakuake
    - khelpcenter
    - kfind
    - polkit-kde-agent-1
    - xdg-desktop-portal-kde
  become: true
  when: rock_4b_remove_kde_desktop | bool

- name: Boot to CLI instead of desktop
  ansible.builtin.file:
    path: /etc/systemd/system/default.target
    state: link
    src: /lib/systemd/system/multi-user.target
    force: true
  become: true
  when: rock_4b_remove_kde_desktop | bool

- name: Gather service facts
  ansible.builtin.service_facts:
  when: rock_4b_remove_kde_desktop | bool

- name: Stop and disable known display manager services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
    masked: true
  loop:
    - sddm.service
    - lightdm.service
    - gdm.service
    - lxdm.service
  become: true
  when:
    - rock_4b_remove_kde_desktop | bool
    - ansible_facts.services is defined
    - item in ansible_facts.services

# Remove radxa and rock users if requested
- name: Remove radxa user
  ansible.builtin.user:
    name: radxa
    state: absent
    remove: true
    force: true
  become: true
  register: rock_4b_remove_radxa_user_result
  when: rock_4b_remove_radxa_user | bool

- name: Remove rock user
  ansible.builtin.user:
    name: rock
    state: absent
    remove: true
    force: true
  become: true
  register: rock_4b_remove_rock_user_result
  when: rock_4b_remove_rock_user | bool

# Disable HDMI output
- name: Disable HDMI output
  ansible.builtin.copy:
    dest: /etc/modprobe.d/disable-rockchip-hdmi.conf
    content: "blacklist rockchipdrm\n"
    owner: root
    group: root
    mode: "0644"
  become: true
  register: rock_4b_hdmi_disable_result
  when: rock_4b_disable_hdmi | bool

# Reboot if required
- name: Check if a reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: rock_4b_reboot_required
  tags: [update, reboot]

- name: Log reboot requirement status
  ansible.builtin.debug:
    msg: >-
      Reboot required: {{ rock_4b_reboot_required.stat.exists | bool }}.
      Auto reboot enabled: {{ rock_4b_reboot_if_required | bool }}.
  tags: [update, reboot]

- name: Reboot if required
  ansible.builtin.reboot:
    msg: "Rebooting to apply Rock 4B configuration changes."
    reboot_timeout: 600
  when:
    - rock_4b_reboot_if_required | bool
    - rock_4b_reboot_required.stat.exists or (rock_4b_hdmi_disable_result is defined and rock_4b_hdmi_disable_result.changed)
  become: true
  tags: [update, reboot]
