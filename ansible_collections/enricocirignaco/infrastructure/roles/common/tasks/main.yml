---
# tasks file for roles/common

- name: Set timezone
  ansible.builtin.timezone:
    name: "{{ common_timezone }}"
  tags: [timezone, common]

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ common_hostname }}"
  tags: [hostname, common]

- name: Ensure 127.0.1.1 maps to hostname
  ansible.builtin.blockinfile:
    path: /etc/hosts
    block: |
      127.0.0.1   localhost
      127.0.1.1   {{ common_hostname }}
    insertafter: BOF
    create: true
  tags: [hostname, common]

- name: Ensure system time sync service is enabled and running (systemd-timesyncd)
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  tags: [timesync, common]

- name: Validate admin authorized keys list
  ansible.builtin.assert:
    that:
      - common_admin_authorized_keys is defined
      - common_admin_authorized_keys | length > 0
    fail_msg: "common_admin_authorized_keys must contain at least one SSH public key so the admin user can access the host."
  tags: [users, common, ssh]

- name: Ensure admin supplemental groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
    system: true
  loop: "{{ common_admin_groups }}"
  when: common_admin_groups | length > 0
  tags: [users, common]

- name: Ensure admin user exists
  ansible.builtin.user:
    name: "{{ common_admin_user }}"
    shell: "{{ common_admin_shell }}"
    home: "{{ common_admin_home }}"
    groups: "{{ common_admin_groups | join(',') if common_admin_groups | length > 0 else omit }}"
    append: true
    state: present
    create_home: true
  tags: [users, common]

- name: Ensure admin has passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ common_admin_user }}"
    content: "{{ common_admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  tags: [users, common]

- name: Ensure admin .ssh directory exists
  ansible.builtin.file:
    path: "{{ common_admin_home }}/.ssh"
    state: directory
    owner: "{{ common_admin_user }}"
    group: "{{ common_admin_user }}"
    mode: "0700"
  when: common_admin_authorized_keys | length > 0
  tags: [users, common, ssh]

- name: Install admin authorized SSH keys
  ansible.builtin.authorized_key:
    user: "{{ common_admin_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ common_admin_authorized_keys }}"
  when: common_admin_authorized_keys | length > 0
  tags: [users, common, ssh]

- name: Remind operator to set admin password
  ansible.builtin.debug:
    msg: |
      '{{ common_admin_user }}' account is provisioned with SSH key access only.
      After first login run: sudo passwd {{ common_admin_user }}
  tags: [users, common]

- name: Ensure cron package is installed
  ansible.builtin.apt:
    name: cron
    state: present
    update_cache: true
  when: common_enable_cron | bool
  tags: [cron, common]

- name: Ensure cron is enabled and running
  ansible.builtin.systemd:
    name: cron
    enabled: true
    state: started
  when: common_enable_cron | bool
  tags: [cron, common]

- name: Ensure base packages are installed
  ansible.builtin.apt:
    name: "{{ common_base_packages }}"
    state: present
    update_cache: true
  tags: [packages, common]

- name: Ensure Tailscale apt keyring is installed
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"
    owner: root
    group: root
  when: common_install_tailscale | bool
  tags: [tailscale, common]

- name: Ensure Tailscale apt repository is configured
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.tailscale-keyring.list"
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: "0644"
    owner: root
    group: root
  when: common_install_tailscale | bool
  tags: [tailscale, common]

- name: Install Tailscale package when requested
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  when: common_install_tailscale | bool
  tags: [tailscale, common]

- name: Ensure tailscaled service is enabled and running
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  when: common_install_tailscale | bool
  tags: [tailscale, common]

- name: Ensure needed locales are generated
  community.general.locale_gen:
    name: "{{ locale }}"
    state: present
  loop: "{{ [common_system_locale, common_system_language | default('')] | reject('equalto', '') | list | unique }}"
  loop_control:
    loop_var: locale
    label: "{{ locale }}"
  tags: [locale, common]

- name: Read current default locale config
  ansible.builtin.slurp:
    path: /etc/default/locale
  register: common_default_locale_file
  failed_when: false
  changed_when: false
  tags: [locale, common]

- name: Set default system locale
  ansible.builtin.command: >
    update-locale LANG={{ common_system_language }} LC_CTYPE={{ common_system_locale }}
  when: >
    common_default_locale_file.content is not defined or
    ('LANG=' ~ common_system_language) not in (common_default_locale_file.content | b64decode) or
    ('LC_CTYPE=' ~ common_system_locale) not in (common_default_locale_file.content | b64decode)
  tags: [locale, common]

- name: Enable weekly Disk TRIM
  ansible.builtin.systemd:
    name: fstrim.timer
    enabled: true
    state: started
  tags: [trim, common]

- name: Ensure directory for trusted certificates exists
  ansible.builtin.file:
    path: /usr/local/share/ca-certificates/self-signed
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: common_install_homelab_certs | bool
  tags: [certificates, common]

- name: Install trusted certificates
  ansible.builtin.copy:
    src: root.crt
    dest: /usr/local/share/ca-certificates/self-signed/root.crt
    owner: root
    group: root
    mode: "0644"
  register: custom_ca_cert
  when: common_install_homelab_certs | bool
  tags: [certificates, common]

- name: Update CA certificates
  ansible.builtin.command: update-ca-certificates
  when:
    - common_install_homelab_certs | bool
    - custom_ca_cert is changed
  changed_when: true
  tags: [certificates, common]
