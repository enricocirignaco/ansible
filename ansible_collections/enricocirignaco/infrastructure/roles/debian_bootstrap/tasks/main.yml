---
# tasks file for roles/debian_bootstrap

- name: Pre tasks for Debian bootstrap
  import_tasks: pre_tasks.yml

- name: Create dedicated admin user
  user:
    name: "{{ debian_bootstrap_ansible_user }}"
    shell: /bin/bash
    groups: "{{ debian_bootstrap_ansible_groups | join(',') }}"
    append: true   # Append user to groups without removing from others
    create_home: true
    state: present

- name: Install authorized_keys
  authorized_key:
    user: "{{ debian_bootstrap_ansible_user }}"
    path: "/home/{{ debian_bootstrap_ansible_user }}/.ssh/authorized_keys"
    key: "{{ item }}"
    state: present
    manage_dir: true # Ensure .ssh directory is present
  loop: "{{ debian_bootstrap_admin_pubkeys }}"

- name: Enforce authorized_keys permissions
  file:
    path: "/home/{{ debian_bootstrap_ansible_user }}/.ssh/authorized_keys"
    owner: "{{ debian_bootstrap_ansible_user }}"
    group: "{{ debian_bootstrap_ansible_user }}"
    mode: "0600"
    state: file

- name: Optionally grant passwordless sudo (drop-in)
  copy:
    dest: "/etc/sudoers.d/010-{{ debian_bootstrap_ansible_user }}-nopasswd"
    content: "{{ debian_bootstrap_ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"  # Read-only for owner and group; required for sudoers files
  when: debian_bootstrap_enable_nopasswd_sudo | bool

- name: Remove passwordless sudo drop-in when disabled
  file:
    path: "/etc/sudoers.d/010-{{ debian_bootstrap_ansible_user }}-nopasswd"
    state: absent
  when: not (debian_bootstrap_enable_nopasswd_sudo | bool)

- name: Verify SSH login as admin user
  vars:
    # Override connection user for this block to test the new account directly
    ansible_user: "{{ debian_bootstrap_ansible_user }}"
  become: false
  block:
    - name: Reset SSH connection to pick up new user
      meta: reset_connection

    - name: Wait for connection as {{ debian_bootstrap_ansible_user }}
      wait_for_connection:
        timeout: 30

    - name: Verify the effective remote user is the admin user
      command: whoami
      register: whoami_out
      changed_when: false

    - name: Assert we are logged in as the admin user
      assert:
        that:
          - whoami_out.stdout == debian_bootstrap_ansible_user
        fail_msg: "Re-login as {{ debian_bootstrap_ansible_user }} failed — not creating completion marker."

- name: Display success message
  debug:
    msg: |
      Bootstrap successful. You can now login as '{{ debian_bootstrap_ansible_user }}' on {{ inventory_hostname }}.
      Example: ssh -i <your-private-key> {{ debian_bootstrap_ansible_user }}@{{ ansible_host }}
