---

- name: Preflight | Ensure required variables are defined
  ansible.builtin.assert:
    that:
      - debian_network_interface is defined and debian_network_interface is string
      - debian_network_method_v4 is defined
      - debian_network_method_v4 in ['static', 'dhcp']
      - debian_network_type in ['ethernet', 'wifi']

    fail_msg: >-
      Missing required variables. You must define debian_network_interface and
      debian_network_method_v4 ('static' or 'dhcp'). debian_network_type must be
      'ethernet' or 'wifi'.
  tags: [network]

- name: Preflight | Ensure static IPv4 variables are defined
  ansible.builtin.assert:
    that:
      - >
        debian_network_address is defined and
        debian_network_address is string and
        '/' in debian_network_address and
        ((debian_network_address | ansible.utils.ipaddr('address')) is ansible.utils.ipv4)
      - debian_network_gateway is defined and (debian_network_gateway is ansible.utils.ipv4)
      - >
        debian_network_dns is defined and
        debian_network_dns is iterable and
        (debian_network_dns | select('ansible.utils.ipv4') | list | length == (debian_network_dns | length))

    fail_msg: >-
      Missing required variables for static IPv4 config. You must define
      debian_network_address, debian_network_gateway, and debian_network_dns (list). Example:
      debian_network_interface: eth0
      debian_network_address: 192.168.1.157/24
      debian_network_gateway: 192.168.1.1
      debian_network_dns: ["192.168.1.1", "1.1.1.1"]
  when: debian_network_method_v4 == 'static'
  tags: [network]

- name: Preflight | Ensure Wi-Fi credentials are defined
  ansible.builtin.assert:
    that:
      - debian_network_wifi_ssid is defined
      - debian_network_wifi_ssid is string
      - debian_network_wifi_ssid | length > 0
      - debian_network_wifi_psk is defined
      - debian_network_wifi_psk is string
      - debian_network_wifi_psk | length > 0
    fail_msg: >-
      Missing required Wi-Fi variables. You must define debian_network_wifi_ssid
      and debian_network_wifi_psk when debian_network_type is 'wifi'.
  when: debian_network_type == 'wifi'
  tags: [network]

- name: Ensure arping tool is installed
  ansible.builtin.apt:
    name: iputils-arping
    state: present
    update_cache: false
  become: true
  tags: [network]

- name: Probe for duplicate IP on the LAN (ARP DAD)
  ansible.builtin.command: >
    arping -D -I {{ debian_network_interface }} -c 2 -w 2 {{ debian_network_address | ansible.utils.ipaddr('address') }}
  register: _arping
  changed_when: false
  failed_when: false
  become: true
  when: debian_network_method_v4 == 'static'
  tags: [network]

- name: Abort if desired IP is already in use
  ansible.builtin.fail:
    msg: >
      IP {{ debian_network_address | ansible.utils.ipaddr('address') }} appears to be in use on the local network
      (ARP replies seen). Aborting to prevent an address conflict.
      arping output: {{ _arping.stdout | default('') }} {{ _arping.stderr | default('') }}
  when:
    - debian_network_method_v4 == 'static'
    - _arping.rc == 1
  tags: [network]

- name: Ensure NetworkManager is installed
  ansible.builtin.apt:
    name: network-manager
    state: present
    update_cache: true
  become: true
  tags: [network]

- name: Ensure NetworkManager service is enabled and running
  ansible.builtin.systemd:
    name: NetworkManager
    enabled: true
    state: started
  become: true
  tags: [network]

- name: Configure ethernet IPv4 connection with NetworkManager
  community.general.nmcli:
    conn_name: "{{ debian_network_interface }}"
    ifname: "{{ debian_network_interface }}"
    type: ethernet
    autoconnect: yes
    method4: "{{ 'manual' if debian_network_method_v4 == 'static' else 'auto' }}"
    ip4: "{{ (debian_network_method_v4 == 'static') | ternary(debian_network_address, omit) }}"
    gw4: "{{ (debian_network_method_v4 == 'static') | ternary(debian_network_gateway, omit) }}"
    dns4: "{{ (debian_network_method_v4 == 'static') | ternary(debian_network_dns, omit) }}"
    state: present
  become: true
  register: nmcli_result
  tags: [network]
  when: debian_network_type == 'ethernet'

- name: Configure wifi IPv4 connection with NetworkManager
  community.general.nmcli:
    conn_name: "{{ debian_network_interface }}"
    ifname: "{{ debian_network_interface }}"
    type: wifi
    ssid: "{{ debian_network_wifi_ssid }}"
    wifi_sec:
      key-mgmt: wpa-psk
      psk: "{{ debian_network_wifi_psk }}"
    autoconnect: yes
    method4: "{{ 'manual' if debian_network_method_v4 == 'static' else 'auto' }}"
    ip4: "{{ (debian_network_method_v4 == 'static') | ternary(debian_network_address, omit) }}"
    gw4: "{{ (debian_network_method_v4 == 'static') | ternary(debian_network_gateway, omit) }}"
    dns4: "{{ (debian_network_method_v4 == 'static') | ternary(debian_network_dns, omit) }}"
    state: present
  become: true
  register: nmcli_result
  no_log: true
  tags: [network]
  when: debian_network_type == 'wifi'

- name: Disable IPv6 on this connection
  community.general.nmcli:
    conn_name: "{{ debian_network_interface }}"
    method6: ignore
    state: present
  become: true
  register: nmcli_ipv6_result
  tags: [network]
  when: debian_network_disable_ipv6

- name: Ensure Avahi (mDNS) is enabled and running
  ansible.builtin.systemd:
    name: avahi-daemon
    enabled: true
    state: started
    masked: false
  become: true
  register: avahi_result
  tags: [network, dns]
  when: debian_network_enable_avahi | bool

- name: Ensure Avahi (mDNS) is disabled and stopped
  ansible.builtin.systemd:
    name: avahi-daemon
    enabled: false
    state: stopped
    masked: false
  become: true
  register: avahi_result
  tags: [network, dns]
  when: not (debian_network_enable_avahi | bool)

- name: Reboot system if needed
  ansible.builtin.reboot:
    msg: "Reboot requested by debian_network role after network changes"
    reboot_timeout: 600
  become: true
  when:
    - debian_network_reboot_if_changed
    - >
      (
        (nmcli_result is defined and nmcli_result.changed)
        or (nmcli_ipv6_result is defined and nmcli_ipv6_result.changed)
        or (avahi_result is defined and avahi_result.changed)
      )
  tags: [network, reboot]
